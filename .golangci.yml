run:
  timeout: 3m
  tests: true

linters:
  disable-all: true
  enable:
    - errcheck
    - govet
    - ineffassign
    - staticcheck
    - unused
    - gofmt
    - goimports
    - revive
    - gocritic
    - gosec
    - bodyclose
    - misspell
    - prealloc
    - unconvert

linters-settings:
  revive:
    rules:
      - name: var-naming
      - name: error-return
      - name: error-strings
      - name: exported

issues:
  exclude-dirs:
    - vendor
    - proto
  exclude-rules:
    - path: _test\.go
      linters: [gosec]
