services:
  postgres:
    image: postgres:15-alpine
    environment:
      POSTGRES_USER: auth
      POSTGRES_PASSWORD: auth
      POSTGRES_DB: auth
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U auth -d auth"]
      interval: 5s
      timeout: 3s
      retries: 10
    volumes:
      - pgdata:/var/lib/postgresql/data

  auth-service:
    build:
      context: .
      args:
        # после `make proto` собирай образ так же, либо передай BUILD_TAGS=proto
        BUILD_TAGS: ""
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      AUTH_ENV: dev
      AUTH_LOG_LEVEL: info
      AUTH_HTTP_ADDR: ":8080"
      AUTH_GRPC_ADDR: ":9090"
      AUTH_METRICS_ADDR: ":2112"
      AUTH_DB_DSN: "postgres://auth:auth@postgres:5432/auth?sslmode=disable"
      AUTH_DB_MIGRATE_ON_START: "true"
      AUTH_JWT_ISSUER: eventflow-auth
      AUTH_JWT_KEY_DIR: /var/lib/auth/keys
      AUTH_JWT_KEY_ROTATE_EVERY: 720h
      AUTH_JWT_KEY_OVERLAP: 72h
    ports:
      - "8080:8080"   # REST
      - "9090:9090"   # gRPC
      - "2112:2112"   # metrics
    volumes:
      - authkeys:/var/lib/auth/keys

  prometheus:
    image: prom/prometheus:v2.51.0
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
      - '--web.enable-lifecycle'
    volumes:
      - ./monitoring/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - promdata:/prometheus
    ports:
      - "9091:9090"
    depends_on:
      - auth-service
    restart: unless-stopped

  grafana:
    image: grafana/grafana:10.4.0
    environment:
      GF_SECURITY_ADMIN_USER: admin
      GF_SECURITY_ADMIN_PASSWORD: admin
      GF_USERS_ALLOW_SIGN_UP: "false"
      GF_DASHBOARDS_DEFAULT_HOME_DASHBOARD_PATH: /etc/grafana/provisioning/dashboards/auth-service.json
    volumes:
      - ./monitoring/grafana/provisioning:/etc/grafana/provisioning:ro
      - grafanadata:/var/lib/grafana
    ports:
      - "3000:3000"
    depends_on:
      - prometheus
    restart: unless-stopped

volumes:
  pgdata:
  authkeys:
  promdata:
  grafanadata:
